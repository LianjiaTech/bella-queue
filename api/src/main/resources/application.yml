server:
  tomcat:
    threads:
      max: 500
  max-http-header-size: 10240

spring:
  mvc:
    async:
      request-timeout: 310000
  datasource:
    url: ${BELLA_DB_URL}
    username: ${BELLA_DB_USERNAME}
    password: ${BELLA_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 25
      maximum-pool-size: 200
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=30m

# Docs API配置
springdoc:
  swagger-ui:
    path: /docs/index.html
    enabled: true
  api-docs:
    path: /docs/api
    enabled: true


bella:
  openapi:
    host: ${BELLA_OPEN_API_BASE}
    apikey: ${BELLA_OPEN_CONSOLE_KEY}
    service-ak: ${BELLA_OPEN_CONSOLE_KEY}
    service: bella-queue
  server:
    initializer:
      enabled: true
  queue:
    secretKey: ${QUEUE_SECRET_KEY}
    batch:
      threadSize: ${BATCH_THREAD_SIZE}
    redis:
      host: ${QUEUE_REDIS_HOST}
      port: ${QUEUE_REDIS_PORT}
      password: ${QUEUE_REDIS_PASSWORD}
    worker:
      enabled: ${WORKER_ENABLED:true}
      scheduled:
        enabled: ${SCHEDULED_WORKER_ENABLED:true}
        queues: ${WORKER_QUEUES:bella_batch_split_queue:1}
        take-strategy: ${TAKE_STRATEGY:sequential}
        size: ${TAKE_SIZE:1}
        scheduleWorkerDelayMs: ${SCHEDULED_DELAY_MS:5000}
  # ASR配置
  asr:
    # ASR 独立数据库配置
    datasource:
      url: ${BELLA_ASR_DB_URL}
      username: ${BELLA_ASR_DB_USERNAME}
      password: ${BELLA_ASR_DB_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        minimum-idle: 10
        maximum-pool-size: 50
        idle-timeout: 30000
        max-lifetime: 1800000
        connection-timeout: 30000
        connection-test-query: SELECT 1
    shard:
      threshold: ${BELLA_ASR_SHARD_THRESHOLD:20000000}
      check-interval-cron: ${BELLA_ASR_SHARD_CHECK_CRON:0 */5 * * * ?}
    data:
      limit: ${BELLA_ASR_DATA_LIMIT:65000}
    queue:
      service-host: ${BELLA_ASR_QUEUE_SERVICE_HOST}
      api-key: ${BELLA_ASR_QUEUE_API_KEY}
      endpoint: ${BELLA_ASR_QUEUE_ENDPOINT:/v1/audio/transcriptions/file}
      default-level: ${BELLA_ASR_QUEUE_DEFAULT_LEVEL:1}
      default-timeout: ${BELLA_ASR_QUEUE_DEFAULT_TIMEOUT:300}
      timeout: ${BELLA_ASR_QUEUE_TIMEOUT:300}
      retries: ${BELLA_ASR_QUEUE_RETRIES:3}
    callback:
      secret: ${BELLA_ASR_CALLBACK_SECRET:}
    openapi:
      fetchbysha-url: ${BELLA_ASR_OPENAPI_FETCHBYSHA_URL}
      fetchbycode-url: ${BELLA_ASR_OPENAPI_FETCHBYCODE_URL}
      ak: ${BELLA_ASR_OPENAPI_AK}
    usage-report:
      url: ${BELLA_ASR_USAGE_REPORT_URL}
      ak: ${BELLA_ASR_USAGE_REPORT_AK}
      endpoint: ${BELLA_ASR_USAGE_REPORT_ENDPOINT:/v1/audio/transcriptions/file}
      timeout: ${BELLA_ASR_USAGE_REPORT_TIMEOUT:10000}
      retries: ${BELLA_ASR_USAGE_REPORT_RETRIES:3}
app:
  id: bella-queue

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      profile: ${spring.profiles.active}

logging:
  level:
    javax.net.ssl: ERROR
    okhttp3: ERROR
    okhttp3.internal: ERROR
