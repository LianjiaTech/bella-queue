bella:
  queue:
    redis:
      host: localhost
      port: 6379

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bella_queue_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
