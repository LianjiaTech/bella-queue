services:
  mysql:
    image: mysql:8.0
    container_name: bella-queue-mysql-dev
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-bella_queue}
      MYSQL_USER: ${DB_USER:-bella_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-123456}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ../../sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-bella_user}", "--password=${DB_PASSWORD:-123456}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: bella-queue-redis-dev
    command: redis-server --requirepass ${QUEUE_REDIS_PASSWORD:-123456}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${QUEUE_REDIS_PASSWORD:-123456}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
